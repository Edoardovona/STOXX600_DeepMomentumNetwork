# Data paths
data:
  raw_csv_dir: data/raw/stoxx600  # prices_YYYY.csv live here
  raw_excel: data/raw/stoxx600/2025_2026_PRICE_ATLAS_data_sxxr_static.xlsx
  universe_dir: data/universe/stoxx600  # universe_by_year.json + all_sxxp_stocks.csv
  processed_dir: data/processed/stoxx600
  stocks_csv: data/processed/stoxx600/stoxx600_processed.csv
  benchmarks_csv: data/processed/stoxx600/benchmark_stoxx600_ew.csv

# Universe
assets: []

# Changepoint detection (used in week 2)
lbw: 21

# Data range 
start_year: 2006
end_year: 2026
csv_last_year: 2024       # CSVs cover up to this year; xlsx takes over after

# Return horizons (per-ticker rolling windows)
# Each entry: [lag_in_days, label]. Used for arithmetic and log returns.
return_horizons:
  - [1, "1d"]
  - [21, "21d"]
  - [252, "252d"]

# Realised volatility windows (annualized, from 1d arithmetic returns) --> 1d is deliberately omitted: rolling std with window=1 is undefined.
vol_windows:
  - [21, "21d"]
  - [252, "252d"]

# Portfolio / signal
vol_target: 0.15
ewm_span: 60

# CPD lookback windows (in days)
cpd_lookbacks:
  - 10
  - 21
  - 63
  - 126
  - 252

# MACD pairs (Short span, Long span)
macd_pairs:
  - [8, 24]
  - [16, 28]
  - [32, 96]