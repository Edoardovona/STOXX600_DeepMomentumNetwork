# Data paths
data:
  processed_dir: data/processed/stoxx600
  processed_cpd: data/processed/cpd
  processed_mod: data/processed/models
  raw_bloomberg: data/raw/stoxx600/SXXR.xlsx

# Universe
assets: []

# Data range 
start_year: 2006
end_year: 2026

# Return horizons (per-ticker rolling windows)
# Each entry: [lag_in_days, label]. Used for arithmetic and log returns.
return_horizons:
  - [1, "1d"]
  - [21, "21d"]
  - [63, "63d"]
  - [126, "126d"]
  - [252, "252d"]

# Realised volatility windows (annualized, from 1d arithmetic returns) --> 1d is deliberately omitted: rolling std with window=1 is undefined.
vol_windows:
  - [21, "21d"]
  - [63, "63d"]
  - [126, "126d"]
  - [252, "252d"]

# Portfolio / signal
vol_target: 0.15   # paper Eq. 11; reused as DMN target_vol


# MACD pairs (Short span, Long span)
macd_pairs:
  - [8, 24]
  - [16, 48] # there was a typo in the paper, corrected according to Lim, Zohren, and Roberts (2019)
  - [32, 96]


# Deep Momentum Network (LTSM)
dmn:
  cpd_lbw:    21       # CPD lookback window (paper sweeps {10, 21, 63, 126, 252})
  cpd_stride:  1
  seq_len:    63       # LSTM sequence length (paper Appendix B)
  hidden:     20       # LSTM hidden state size
  dropout:    0.3
  batch:      128      # batch size; reduce to 64 for single-ticker test mode
  lr:         0.001
  epochs:     100      # max epochs; paper uses 300
  patience:   25       # early-stopping patience (n. of epochs) on val Sharpe
  seed:        1
  long_only: false              # true for X_t in (0,1)
  transaction_cost: 0.0         # 0.0 = no costs; 0.0025 = 25 bps


# LightGBM (V2 -- Justine's implementation: 22 features w/ lag-1, 16 annual
# expanding folds from 2011, raw sigmoid(alpha*score) positions, no vol-target
# scaling. See src/lgbm.py and notebooks/03_train_lgbm.ipynb.)
lgbm:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 4
  num_leaves: 15
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  position_halflife: 10      # EMA smoothing halflife (days)
  alpha_max: 200             # upper bound for sigmoid calibration search
  val_frac: 0.10             # fraction of training data held out for validation/calibration
  cpd_filter_strength: 1.0   # 0 = no filter, 1 = full neutralisation on max nu
  transaction_cost: 0.0025   # 25 bps -- used for alpha calibration (net Sharpe) and matches NB04 backtest cost
  test_start: 2011           # first walk-forward test year
  window_years: null         # null = expanding (all available history since 2006)


# Walk-forward validation
fold_type: expanding   # "expanding" or "rolling"

folds_expanding:
  - {train_start: "2006-01-01", train_end: "2010-12-31",
     test_start:  "2011-01-01", test_end:  "2015-12-31"}  
  - {train_start: "2006-01-01", train_end: "2015-12-31",
     test_start:  "2016-01-01", test_end:  "2020-12-31"}  
  - {train_start: "2006-01-01", train_end: "2020-12-31",
     test_start:  "2021-01-01", test_end:  "2025-12-31"}  

folds_rolling:
  - {train_start: "2006-01-01", train_end: "2016-12-31",
     test_start:  "2017-01-01", test_end:  "2019-12-31"} 
  - {train_start: "2010-01-01", train_end: "2019-12-31",
     test_start:  "2020-01-01", test_end:  "2022-12-31"} 
  - {train_start: "2013-01-01", train_end: "2022-12-31",
     test_start:  "2023-01-01", test_end:  "2025-12-31"}  